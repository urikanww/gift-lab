# =============================================================================
# Gift Lab — Nginx site config (DigitalOcean Ubuntu, LEMP)
# Three server blocks: API (Laravel), SPA (static React build), Reverb (wss).
# TLS certs are issued by Certbot (see DEPLOYMENT.md); Certbot rewrites the
# listen 443 blocks and adds the http->https redirect automatically.
# =============================================================================

# --- API: api.giftlab.example ------------------------------------------------
server {
    listen 80;
    server_name api.giftlab.example;
    root /var/www/giftlab/current/public;

    index index.php;
    charset utf-8;

    # Security headers (A05 hardening).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# --- SPA: app.giftlab.example (static Vite build) ----------------------------
server {
    listen 80;
    server_name app.giftlab.example;
    root /var/www/giftlab-spa/current/dist;

    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# --- Reverb websockets: reverb.giftlab.example -------------------------------
server {
    listen 80;
    server_name reverb.giftlab.example;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket upgrade.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
