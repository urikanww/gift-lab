; Laravel queue workers - process broadcast fan-out, scraper/3D jobs (Phase 2),
; mail, etc. Kept alive perpetually by Supervisor.
; Install to /etc/supervisor/conf.d/giftlab-worker.conf
[program:giftlab-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/giftlab/current/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/giftlab/worker.log
stopwaitsecs=3600
